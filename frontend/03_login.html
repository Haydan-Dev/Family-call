<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Hamnasheen - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    width:100%; height:100%; overflow:hidden;
    background:#111111;
    font-family:'DM Sans', sans-serif;
    color:#FFFFFF;
    -webkit-font-smoothing:antialiased;
  }

  body::before {
    content:'';
    position:fixed;
    top:28%; left:50%;
    transform:translate(-50%, -50%);
    width:280px; height:280px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,199,0,0.09) 0%, transparent 68%);
    pointer-events:none;
    z-index:0;
  }

  body::after {
    content:'';
    position:fixed;
    bottom:-80px; left:50%;
    transform:translateX(-50%);
    width:400px; height:260px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,199,0,0.06) 0%, transparent 70%);
    pointer-events:none;
    z-index:0;
  }

  .splash {
    position:relative; z-index:1;
    width:100%; height:100dvh;
    max-width:430px; margin:0 auto;
    display:flex; flex-direction:column;
    align-items:center; justify-content:space-between;
    padding:64px 32px 48px;
  }

  .center {
    flex:1;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
  }

  .logo-wrap {
    position:relative;
    width:80px; height:80px;
    margin-bottom:24px;
    display:flex; align-items:center; justify-content:center;
    opacity:0;
    animation:appear 0.7s ease 0.15s forwards;
  }
  .logo-wrap::before {
    content:''; position:absolute; inset:-10px;
    border-radius:50%; border:1px solid rgba(255,199,0,0.15);
  }
  .logo-wrap::after {
    content:''; position:absolute; inset:-20px;
    border-radius:50%; border:1px solid rgba(255,199,0,0.06);
  }
  .logo { width:60px; height:60px; }
  .logo svg { width:100%; height:100%; }

  .name {
    font-family:'Playfair Display', serif;
    font-size:32px; font-weight:700;
    letter-spacing:-0.01em; line-height:1;
    color:#FFFFFF; opacity:0;
    animation:appear 0.6s ease 0.35s forwards;
  }
  .name em { font-style:italic; font-weight:400; color:#FFC700; }

  .tagline {
    margin-top:12px; font-size:11px; font-weight:500;
    letter-spacing:0.26em; text-transform:uppercase;
    color:#888; opacity:0;
    animation:appear 0.6s ease 0.5s forwards;
  }

  .line {
    width:28px; height:1px;
    background:linear-gradient(90deg, transparent, #FFC700, transparent);
    margin:20px 0; opacity:0;
    animation:appear 0.6s ease 0.62s forwards;
  }

  .form-container {
    width:100%;
    display:flex; flex-direction:column; gap:12px;
    opacity:0;
    animation:appear 0.6s ease 0.88s forwards;
  }

  .input-field {
    width: 100%;
    padding: 17px;
    border-radius: 16px;
    background: transparent;
    color: #FFFFFF;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    border: 1px solid #2A2A2A;
    outline: none;
    transition: border-color 0.15s;
  }
  .input-field:focus {
    border-color: #FFC700;
  }
  .input-field::placeholder {
    color: #A0A0A0;
  }

  .btn-primary {
    display:block; width:100%;
    padding:17px; border-radius:16px;
    background:#FFC700; color:#111111;
    font-family:'DM Sans', sans-serif;
    font-size:15px; font-weight:700;
    letter-spacing:0.03em;
    text-align:center; text-decoration:none;
    border:none; cursor:pointer;
    -webkit-user-select:none;
    transition:opacity 0.15s, transform 0.15s;
  }
  .btn-primary:active { opacity:0.82; transform:scale(0.985); }

  .btn-secondary {
    display:block; width:100%;
    padding:17px; border-radius:16px;
    background:transparent; color:#A0A0A0;
    font-family:'DM Sans', sans-serif;
    font-size:15px; font-weight:400;
    text-align:center; text-decoration:none;
    border:1px solid #2A2A2A; cursor:pointer;
    -webkit-user-select:none;
    transition:border-color 0.15s, color 0.15s;
  }
  .btn-secondary:active { border-color:#3A3A3A; color:#fff; }

  @keyframes appear {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0); }
  }
</style>
</head>
<body>

<div class="splash">

  <div class="center">
    <div class="logo-wrap">
      <div class="logo">
        <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M36 6 L6 28 H14 V64 H58 V28 H66 Z" stroke="#FFC700" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
        <circle cx="27" cy="34" r="3.5" fill="#FFC700"/>
        <path d="M27 38 Q27 46 27 52" stroke="#FFC700" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M27 42 Q23 45 21 48" stroke="#FFC700" stroke-width="1.8" stroke-linecap="round" fill="none"/>
        <path d="M27 42 Q31 44 34 46" stroke="#FFC700" stroke-width="1.8" stroke-linecap="round" fill="none"/>
        <path d="M27 52 Q25 57 24 62" stroke="#FFC700" stroke-width="1.8" stroke-linecap="round" fill="none"/>
        <path d="M27 52 Q29 57 30 62" stroke="#FFC700" stroke-width="1.8" stroke-linecap="round" fill="none"/>
        <circle cx="40" cy="38.5" r="2.6" fill="#FFC700"/>
        <path d="M40 41.5 Q40 47 40 53" stroke="#FFC700" stroke-width="1.6" stroke-linecap="round" fill="none"/>
        <path d="M40 44.5 Q37 45.5 34 46" stroke="#FFC700" stroke-width="1.6" stroke-linecap="round" fill="none"/>
        <path d="M40 44.5 Q44 42 46 40" stroke="#FFC700" stroke-width="1.6" stroke-linecap="round" fill="none"/>
        <path d="M40 53 Q38.5 57 38 62" stroke="#FFC700" stroke-width="1.6" stroke-linecap="round" fill="none"/>
        <path d="M40 53 Q41.5 57 42 62" stroke="#FFC700" stroke-width="1.6" stroke-linecap="round" fill="none"/>
        <circle cx="34" cy="46" r="1.8" fill="#FFC700" opacity="0.9"/>
      </svg>
      </div>
    </div>
    <h1 class="name">Ham<em>nasheen</em></h1>
    <p class="tagline">Login</p>
    <div class="line"></div>
  </div>

  <form class="form-container" id="loginForm">
    <input type="email" id="email" class="input-field" placeholder="Email" required />
    <input type="password" id="password" class="input-field" placeholder="Password" required />
    <button type="submit" class="btn-primary">Login</button>
    <a href="02_signup.html" class="btn-secondary">Don't have an account? Sign Up</a>
  </form>

</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
      const response = await fetch('http://127.0.0.1:8000/users/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password })
      });

      if (response.ok) {
        const data = await response.json();
        const token = data.token || data.access_token;
        if (token) {
          localStorage.setItem('token', token);
          console.log("TOKEN ACQUIRED");
          window.location.href = '04_home.html';
        } else {
          alert('Login successful but no token found in response.');
        }
      } else {
        const errorData = await response.json();
        alert('Login failed: ' + (errorData.message || 'Unknown error'));
      }
    } catch (error) {
      console.error('Error during login:', error);
      alert('Error connecting to server.');
    }
  });
</script>

</body>
</html>
