<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Hamnasheen - Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; min-height: 100vh;
    background: #111111;
    font-family: 'DM Sans', sans-serif;
    color: #FFFFFF;
    -webkit-font-smoothing: antialiased;
    overflow: hidden; /* Prevent body scroll, manage in container */
  }

  body::before {
    content: '';
    position: fixed;
    top: -10%; left: 50%;
    transform: translateX(-50%);
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,199,0,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .chat-container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 430px;
    margin: 0 auto;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    background: #111111;
  }

  /* HEADER */
  .chat-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,199,0,0.1);
    background: rgba(17, 17, 17, 0.9);
    backdrop-filter: blur(10px);
    z-index: 10;
  }

  .back-btn {
    background: transparent;
    border: none;
    color: #FFC700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 4px;
    transition: transform 0.2s;
  }
  .back-btn:active { transform: scale(0.9); }

  .header-title {
    font-size: 16px;
    font-weight: 600;
    color: #FFFFFF;
    flex: 1;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 12px;
  }

  /* CHAT BODY */
  .chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .loading-state {
    display: flex; justify-content: center; padding: 20px;
  }
  .spinner {
    width: 24px; height: 24px;
    border: 2px solid rgba(255,199,0,0.3); border-top-color: #FFC700;
    border-radius: 50%; animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-chat {
    text-align: center;
    color: #A0A0A0;
    font-size: 14px;
    margin-top: 40px;
  }

  /* BUBBLES */
  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.4;
    word-wrap: break-word;
    animation: fade-in 0.3s ease forwards;
    opacity: 0;
    transform: translateY(8px);
    display: flex;
    flex-direction: column;
  }

  @keyframes fade-in {
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-left {
    align-self: flex-start;
    background: rgba(255, 255, 255, 0.05);
    color: #FFFFFF;
    border-bottom-left-radius: 4px;
  }

  .msg-right {
    align-self: flex-end;
    background: rgba(255, 199, 0, 0.1);
    color: #FFC700;
    border: 1px solid rgba(255, 199, 0, 0.15);
    border-bottom-right-radius: 4px;
  }

  .msg-deleted {
    font-style: italic;
    color: #888888;
    background: transparent;
    border: 1px dashed rgba(255, 255, 255, 0.15);
  }

  .bubble img {
    max-width: 100%;
    border-radius: 8px;
    margin-top: 4px;
    margin-bottom: 4px;
  }

  .bubble-time {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.4);
    align-self: flex-end;
    margin-top: 4px;
  }
  .msg-right .bubble-time { color: rgba(255, 199, 0, 0.5); }

  /* FOOTER */
  .chat-footer {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: rgba(17, 17, 17, 0.95);
    border-top: 1px solid rgba(255, 199, 0, 0.1);
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }

  .media-btn {
    background: rgba(255, 199, 0, 0.1);
    border: none;
    color: #FFC700;
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
    flex-shrink: 0;
  }
  .media-btn:active { background: rgba(255, 199, 0, 0.2); }

  .msg-input {
    flex: 1;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #FFFFFF;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    border-radius: 20px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .msg-input:focus { border-color: #FFC700; }
  .msg-input::placeholder { color: #888888; }

  .send-btn {
    background: #FFC700;
    color: #111111;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.2s, opacity 0.2s, background 0.2s;
    flex-shrink: 0;
  }
  .send-btn:active:not(:disabled) { transform: scale(0.9); }
  .send-btn:disabled {
    background: rgba(255, 255, 255, 0.1);
    color: #555555;
    cursor: not-allowed;
  }

  /* ATTACHMENT MENU */
  .attachment-menu {
    position: absolute;
    bottom: 100%;
    left: 16px;
    margin-bottom: 8px;
    background: #1A1A1A;
    border: 1px solid rgba(255, 199, 0, 0.15);
    border-radius: 16px;
    padding: 8px;
    display: none;
    flex-direction: column;
    gap: 4px;
    width: 220px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    z-index: 50;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.2s, transform 0.2s;
  }
  .attachment-menu.active {
    display: flex;
    opacity: 1;
    transform: translateY(0);
  }
  .attach-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    color: #FFFFFF;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.2s, color 0.2s;
  }
  .attach-item svg {
    width: 20px; height: 20px;
    color: #A0A0A0;
    transition: color 0.2s;
  }
  .attach-item:hover {
    background: rgba(255, 199, 0, 0.05);
    color: #FFC700;
  }
  .attach-item:hover svg {
    color: #FFC700;
  }

  /* CONTEXT MENU */
  .context-menu {
    position: absolute;
    background: #1A1A1A;
    border: 1px solid rgba(255, 199, 0, 0.15);
    border-radius: 12px;
    padding: 6px;
    display: none;
    flex-direction: column;
    gap: 2px;
    width: 180px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
    z-index: 100;
  }
  .context-menu.active {
    display: flex;
  }
  .ctx-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    color: #FFFFFF;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.2s, color 0.2s;
  }
  .ctx-item svg {
    width: 18px; height: 18px;
    color: #A0A0A0;
    transition: color 0.2s;
  }
  .ctx-item:hover {
    background: rgba(255, 199, 0, 0.1);
    color: #FFC700;
  }
  .ctx-item:hover svg {
    color: #FFC700;
  }
  .ctx-item.delete {
    color: #FF4444;
  }
  .ctx-item.delete svg {
    color: #FF4444;
  }
  .ctx-item.delete:hover {
    background: rgba(255, 68, 68, 0.1);
    color: #FF4444;
  }

</style>
</head>
<body>

<div class="chat-container">
  
  <header class="chat-header">
    <button class="back-btn" id="backBtn" onclick="window.location.href='04_home.html'">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </button>
    <div class="header-title" id="roomTitle">Loading Chat...</div>
    <div style="width:24px;"></div> <!-- Spacer to keep title centered -->
  </header>

  <main class="chat-body" id="chatBody">
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
    </div>
  </main>

  <footer class="chat-footer">
    <div class="attachment-menu" id="attachMenu">
      <div class="attach-item" data-type="document">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        Document
      </div>
      <div class="attach-item" data-type="photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        Photos &amp; videos
      </div>
      <div class="attach-item" data-type="camera">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
        Camera
      </div>
      <div class="attach-item" data-type="audio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
        Audio
      </div>
      <div class="attach-item" data-type="contact">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        Contact
      </div>
      <div class="attach-item" data-type="poll">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
        Poll
      </div>
    </div>
    <input type="file" id="mediaInput" accept="image/*,video/*" style="display:none" />
    <button class="media-btn" id="mediaBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    </button>
    <input type="text" class="msg-input" id="msgInput" placeholder="Message..." autocomplete="off"/>
    <button class="send-btn" id="sendBtn" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-left: -2px;">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </footer>

</div>

<!-- CONTEXT MENU -->
<div id="msgContextMenu" class="context-menu">
  <div class="ctx-item" data-action="reply">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 17 4 12 9 7"></polyline><path d="M20 18v-2a4 4 0 0 0-4-4H4"></path></svg>
    Reply
  </div>
  <div class="ctx-item" data-action="forward">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 17 20 12 15 7"></polyline><path d="M4 18v-2a4 4 0 0 1 4-4h12"></path></svg>
    Forward
  </div>
  <div class="ctx-item" data-action="pin">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"></line><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 11.24V6a3 3 0 0 0-6 0v5.24a2 2 0 0 1-1.11 1.31l-1.78.9A2 2 0 0 0 5 15.24Z"></path></svg>
    Pin
  </div>
  <div class="ctx-item" id="ctxEdit" data-action="edit">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
    Edit
  </div>
  <div class="ctx-item delete" id="ctxDelete" data-action="delete">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
    Delete
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // 1. Core Setup & Authentication
  const token = localStorage.getItem('token');
  if (!token) {
    window.location.href = '03_login.html';
    return;
  }

  const BASE_URL = 'http://127.0.0.1:8000';
  const urlParams = new URLSearchParams(window.location.search);
  const roomId = urlParams.get('room_id');
  const contactName = urlParams.get('name');

  if (!roomId) {
    alert("Invalid Room ID");
    window.location.href = '04_home.html';
    return;
  }

  // Set header title
  if (contactName) {
    document.getElementById('roomTitle').textContent = contactName;
  } else {
    document.getElementById('roomTitle').textContent = `Room: ${roomId.substring(0, 8)}...`;
  }

  // Parse JWT to find user ID for distinguishing sender/receiver
  let myUserId = null;
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    myUserId = payload.sub || payload.id || payload.user_id || payload.owner_id || null;
  } catch(e) {
    console.warn("Could not parse JWT token for user ID");
  }

  // DOM Elements
  const chatBody = document.getElementById('chatBody');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  const mediaBtn = document.getElementById('mediaBtn');
  const mediaInput = document.getElementById('mediaInput');
  const loadingState = document.getElementById('loadingState');

  let currentMsgCount = 0;
  let isFetching = false;
  let isFirstLoad = true;

  // Helper 1: authFetch
  async function authFetch(url, options = {}) {
    const headers = { 'Authorization': `Bearer ${token}` };
    if (!(options.body instanceof FormData)) {
      headers['Content-Type'] = 'application/json';
    }
    try {
      const res = await fetch(url, { ...options, headers });
      if (res.status === 401) {
        localStorage.removeItem('token');
        window.location.href = '03_login.html';
        throw new Error('Unauthorized');
      }
      return res;
    } catch (error) {
      console.error("Network or fetch error:", error);
      throw error;
    }
  }

  // Helper 2: Scroll to Bottom
  function scrollToBottom() {
    chatBody.scrollTop = chatBody.scrollHeight;
  }

  // 2. Load History
  async function fetchHistory() {
    if (isFetching) return;
    isFetching = true;

    try {
      const res = await authFetch(`${BASE_URL}/messages/history/${roomId}`, { method: 'GET' });
      if (res.ok) {
        const data = await res.json();
        // Priority to 'Chat', then standard fallback arrays
        const messages = Array.isArray(data) ? data : (data.Chat || data.messages || data.data || []);
        renderMessages(messages);
      }
    } catch (error) {
      console.error("Error fetching history:", error);
    } finally {
      isFetching = false;
      if (isFirstLoad) {
        if (loadingState) loadingState.style.display = 'none';
        isFirstLoad = false;
      }
    }
  }

  function renderMessages(messages) {
    // If no messages at all
    if (messages.length === 0 && currentMsgCount === 0) {
      if (loadingState) loadingState.style.display = 'none';
      if (!document.querySelector('.empty-chat')) {
        const emptyDiv = document.createElement('div');
        emptyDiv.className = 'empty-chat';
        emptyDiv.textContent = 'No messages yet. Start the conversation!';
        chatBody.appendChild(emptyDiv);
      }
      return;
    }

    // Optimization: Only process new messages
    if (messages.length === currentMsgCount) return;

    // Remove empty state message if it exists
    const emptyState = document.querySelector('.empty-chat');
    if (emptyState) emptyState.remove();
    if (loadingState) loadingState.style.display = 'none';

    // Append only NEW messages to avoid full re-render
    const newMessages = messages.slice(currentMsgCount);

    newMessages.forEach((msg, index) => {
      const isDeleted = msg.is_deleted === true;
      const senderId = msg.sender_id || msg.user_id;
      
      let isMine = false;
      if (msg.is_mine !== undefined) {
          isMine = msg.is_mine;
      } else if (myUserId && senderId) {
          isMine = String(senderId) === String(myUserId);
      }

      const bubble = document.createElement('div');
      bubble.className = `bubble ${isMine ? 'msg-right' : 'msg-left'}`;
      
      // Small animation stagger for smooth entry
      bubble.style.animationDelay = `${Math.min(index * 0.05, 0.3)}s`;

      // Context Menu Event
      bubble.oncontextmenu = (e) => {
        e.preventDefault();
        selectedMsgId = msg._id || msg.id;
        
        if (isMine) {
          document.getElementById('ctxEdit').style.display = 'flex';
          document.getElementById('ctxDelete').style.display = 'flex';
        } else {
          document.getElementById('ctxEdit').style.display = 'none';
          document.getElementById('ctxDelete').style.display = 'none';
        }

        // Display to calculate space
        msgContextMenu.style.display = 'flex';
        msgContextMenu.style.visibility = 'hidden'; 
        
        const menuWidth = 180;
        const menuHeight = isMine ? 210 : 130; 
        
        let x = e.pageX;
        let y = e.pageY;
        
        if (x + menuWidth > window.innerWidth) x = window.innerWidth - menuWidth - 10;
        if (y + menuHeight > window.innerHeight) y = window.innerHeight - menuHeight - 10;
        
        msgContextMenu.style.visibility = 'visible';
        msgContextMenu.style.left = `${x}px`;
        msgContextMenu.style.top = `${y}px`;
        msgContextMenu.classList.add('active');
      };

      if (isDeleted) {
        bubble.classList.add('msg-deleted');
        bubble.innerHTML = `<span>This message was deleted</span>`;
      } else {
        const content = msg.content || '';
        
        if (content.startsWith('http://') || content.startsWith('https://')) {
          try {
            const urlObj = new URL(content);
            const pathname = urlObj.pathname.toLowerCase();
            
            if (pathname.match(/\.(jpeg|jpg|gif|png|webp)$/i)) {
              const img = document.createElement('img');
              img.src = content;
              img.alt = "Image";
              img.onload = scrollToBottom;
              bubble.appendChild(img);
            } 
            else if (pathname.match(/\.(mp4|webm|mov)$/i)) {
              const video = document.createElement('video');
              video.src = content;
              video.controls = true;
              video.style.maxWidth = '100%';
              video.style.borderRadius = '8px';
              video.onloadeddata = scrollToBottom;
              bubble.appendChild(video);
            }
            else if (pathname.match(/\.(mp3|wav|ogg)$/i)) {
              const audio = document.createElement('audio');
              audio.src = content;
              audio.controls = true;
              audio.style.maxWidth = '100%';
              bubble.appendChild(audio);
            }
            else if (pathname.match(/\.(pdf|doc|docx|txt|csv)$/i)) {
              const a = document.createElement('a');
              a.href = content;
              a.target = "_blank";
              a.style.color = "#FFC700";
              a.style.textDecoration = "underline";
              a.textContent = "📄 View Document";
              bubble.appendChild(a);
            }
            else {
              const a = document.createElement('a');
              a.href = content;
              a.target = "_blank";
              a.style.color = "#FFC700";
              a.style.textDecoration = "underline";
              a.textContent = content;
              a.style.wordBreak = "break-all";
              bubble.appendChild(a);
            }
          } catch (e) {
            const textSpan = document.createElement('span');
            textSpan.textContent = content;
            bubble.appendChild(textSpan);
          }
        } else {
          const textSpan = document.createElement('span');
          textSpan.textContent = content;
          bubble.appendChild(textSpan);
        }
      }

      // Time formatter
      if (msg.timestamp || msg.created_at) {
        const date = new Date(msg.timestamp || msg.created_at);
        if (!isNaN(date)) {
          const timeSpan = document.createElement('div');
          timeSpan.className = 'bubble-time';
          timeSpan.textContent = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          bubble.appendChild(timeSpan);
        }
      }

      chatBody.appendChild(bubble);
    });

    scrollToBottom();
    currentMsgCount = messages.length;
  }

  // Helper 3: Determine Message Type
  function getMessageType(content) {
    const text = content.toLowerCase();
    
    // 1. Location check
    if (text.includes('google.com/maps') || text.match(/lat.*lng/i) || text.match(/latitude.*longitude/i)) {
      return 'location';
    }

    // 2. Extension mapping for URLs
    if (text.startsWith('http://') || text.startsWith('https://')) {
      try {
        const urlObj = new URL(content);
        const pathname = urlObj.pathname.toLowerCase();
        
        const imageExts = ['.jpg', '.jpeg', '.png', '.gif', '.webp'];
        const videoExts = ['.mp4', '.mov', '.webm', '.avi'];
        const audioExts = ['.mp3', '.wav', '.ogg', '.m4a'];
        const docExts = ['.pdf', '.doc', '.docx', '.xls', '.txt'];

        if (imageExts.some(ext => pathname.endsWith(ext))) return 'image';
        if (videoExts.some(ext => pathname.endsWith(ext))) return 'video';
        if (audioExts.some(ext => pathname.endsWith(ext))) return 'audio';
        if (docExts.some(ext => pathname.endsWith(ext))) return 'doc';
        
      } catch (e) {
        // Ignore URL parsing errors
      }
    }

    // 3. Fallback
    return 'text';
  }

  // 3. Sending Logic
  async function sendMessage(content) {
    if (!content.trim()) return;
    
    const originalText = msgInput.value;
    msgInput.value = '';
    sendBtn.disabled = true;

    // Use robust helper function
    const typeOfMsg = getMessageType(content);

    try {
      if (window.ws && window.ws.readyState === WebSocket.OPEN) {
        window.ws.send(JSON.stringify({ message_type: typeOfMsg, content: content }));
      } else {
        const res = await authFetch(`${BASE_URL}/messages/send/${roomId}`, {
          method: 'POST',
          body: JSON.stringify({ message_type: typeOfMsg, content: content })
        });
        if (res.ok) await fetchHistory();
        else {
          msgInput.value = originalText;
          alert("Failed to send message.");
        }
      }
    } catch (err) {
      console.error(err);
      msgInput.value = originalText;
    } finally {
      checkInput();
      msgInput.focus();
    }
  }

  // Send via Button
  sendBtn.addEventListener('click', () => {
    sendMessage(msgInput.value);
  });

  // Send via Enter Key
  msgInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && !sendBtn.disabled) {
      sendMessage(msgInput.value);
    }
  });

  // Toggle Send Button State
  function checkInput() {
    sendBtn.disabled = msgInput.value.trim().length === 0;
  }
  msgInput.addEventListener('input', checkInput);

  // 4. Media Integration & Attachment Menu
  const attachMenu = document.getElementById('attachMenu');

  mediaBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    attachMenu.classList.toggle('active');
  });

  document.addEventListener('click', (e) => {
    if (!attachMenu.contains(e.target) && e.target !== mediaBtn) {
      attachMenu.classList.remove('active');
    }
  });

  const attachItems = document.querySelectorAll('.attach-item');
  attachItems.forEach(item => {
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      attachMenu.classList.remove('active');
      const type = item.getAttribute('data-type');
      
      if (type === 'photo') {
        mediaInput.removeAttribute('capture');
        mediaInput.accept = 'image/*,video/*';
        mediaInput.click();
      } else if (type === 'camera') {
        mediaInput.accept = 'image/*,video/*';
        mediaInput.setAttribute('capture', 'environment');
        mediaInput.click();
      } else if (type === 'document') {
        mediaInput.removeAttribute('capture');
        mediaInput.accept = '.pdf,.doc,.docx,.txt';
        mediaInput.click();
      } else if (type === 'audio') {
        mediaInput.removeAttribute('capture');
        mediaInput.accept = 'audio/*';
        mediaInput.click();
      } else if (type === 'contact' || type === 'poll') {
        alert('Feature coming soon in Alpha Update!');
      }
    });
  });

  mediaInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    // Show loading state on media button
    mediaBtn.style.opacity = '0.5';
    mediaBtn.style.pointerEvents = 'none';

    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await authFetch(`${BASE_URL}/media/upload`, {
        method: 'POST',
        body: formData
      });

      if (res.ok) {
        const data = await res.json();
        const url = data.url || data.file_url || data.media_url;
        if (url) {
          // Send the URL as a message immediately
          await sendMessage(url);
        } else {
          alert('Upload succeeded but no URL returned from backend.');
        }
      } else {
        alert('Media upload failed.');
      }
    } catch (err) {
      console.error(err);
      alert('Error uploading media. Check console.');
    } finally {
      mediaBtn.style.opacity = '1';
      mediaBtn.style.pointerEvents = 'auto';
      mediaInput.value = ''; // Reset file input
    }
  });

  // 5. Start App & WebSockets
  fetchHistory();
  
  function connectWebSocket() {
    const token = localStorage.getItem('token');
    if (!token) return;
    
    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsBaseUrl = BASE_URL.replace(/^https?:\/\//, '');
    
    window.ws = new WebSocket(`${wsProtocol}//${wsBaseUrl}/ws/chat/${roomId}?token=${token}`);
    
    window.ws.onopen = () => {
      console.log('WebSocket Connected to room', roomId);
    };
    
    window.ws.onmessage = (event) => {
      console.log('WebSocket Msg:', event.data);
      // Update UI instantly
      fetchHistory();
    };
    
    window.ws.onclose = () => {
      console.log('WebSocket Disconnected. Reconnecting in 3s...');
      setTimeout(connectWebSocket, 3000);
    };
  }
  
  connectWebSocket();

  // 6. Context Menu Logic
  let selectedMsgId = null;
  const msgContextMenu = document.getElementById('msgContextMenu');
  
  document.addEventListener('click', (e) => {
    if (msgContextMenu && !msgContextMenu.contains(e.target)) {
      msgContextMenu.classList.remove('active');
      msgContextMenu.style.display = 'none';
    }
  });

  const ctxItems = document.querySelectorAll('.ctx-item');
  ctxItems.forEach(item => {
    item.addEventListener('click', async () => {
      const action = item.getAttribute('data-action');
      msgContextMenu.classList.remove('active');
      msgContextMenu.style.display = 'none';

      if (!selectedMsgId) return;

      try {
        switch (action) {
          case 'delete':
            await authFetch(`${BASE_URL}/messages/delete/${selectedMsgId}`, { method: 'DELETE' });
            break;
          case 'edit':
            const newText = prompt('Enter new message text:');
            if (newText && newText.trim() !== '') {
              await authFetch(`${BASE_URL}/messages/edit/${selectedMsgId}`, {
                method: 'PATCH',
                body: JSON.stringify({ content: newText.trim() })
              });
            }
            break;
          case 'pin':
            await authFetch(`${BASE_URL}/messages/pin/${selectedMsgId}`, { method: 'PATCH' });
            break;
          case 'forward':
            alert('Forward logic: Select a room first!');
            break;
          case 'reply':
            console.log("Reply action triggered for:", selectedMsgId);
            break;
        }
        // Update UI immediately after API hit
        fetchHistory();
      } catch (err) {
        console.error("Context menu action failed:", err);
      }
    });
  });

});
</script>
